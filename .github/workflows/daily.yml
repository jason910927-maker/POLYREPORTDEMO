name: Polymarket Daily Report

on:
  schedule:
    # 多個時間點觸發，提高準時率（GitHub cron 常延遲）
    # UTC 23:30 = 台灣 07:30
    - cron: '30 23 * * *'
    # UTC 00:00 = 台灣 08:00（主要時間）
    - cron: '0 0 * * *'
  workflow_dispatch:  # 允許手動觸發測試

# 防止同時執行（避免重複跑）
concurrency:
  group: polymarket-daily
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write  # 允許 commit tracking.json 與 reports
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run Polymarket Bot
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python main.py
      
      - name: Commit reports and tracking
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add reports/ tracking.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Daily report $(date -u +%Y-%m-%d)"
          git push
        continue-on-error: true
